<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chat</title>

<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
</script>

</head>

<body>

<!-- TELA REGISTRO -->
<div id="screen-register">

  <div class="register-box">

    <h2>Entrar no Chat</h2>

    <input id="register-name" type="text" placeholder="Seu nome">

    <input id="register-secret" type="password" placeholder="Senha mestre (opcional)">

    <button id="register-btn">Entrar</button>

  </div>

</div>


<!-- TELA CHAT -->
<div id="screen-chat" style="display:none;">

  <!-- SIDEBAR -->
  <aside id="sidebar">

    <h3>Online</h3>

    <ul id="users-list"></ul>

  </aside>


  <!-- ÁREA CHAT -->
  <main id="chat-area">

    <div id="global-mute-warning" style="display:none;">
      Chat temporariamente silenciado
    </div>

    <ul id="chat"></ul>

    <!-- BARRA REPLY -->
    <div id="reply-bar" style="display:none;">
      <span id="reply-text"></span>
      <button id="cancel-reply">Cancelar</button>
    </div>

    <!-- INPUT -->
    <div id="chat-input">

      <textarea id="msg-input" placeholder="Mensagem..."></textarea>

      <button id="send-btn">Enviar</button>

    </div>

    <div id="typing-msg"></div>

  </main>


  <!-- PAINEL ADMIN (DESKTOP) -->
  <div id="admin-panel">

    <h3>Painel Mestre</h3>

    <button class="master-action" data-action="clear">
      Limpar chat
    </button>

    <button class="master-action" data-action="globalMute">
      Silenciar todos
    </button>

    <select class="master-select" data-target="mute"></select>

    <button class="master-action" data-action="mute">
      Mutar
    </button>

    <button class="master-action" data-action="unmute">
      Desmutar
    </button>

    <input class="master-input" data-input="name" placeholder="Alterar nome">

    <button class="master-action" data-action="setName">
      Alterar
    </button>

    <h4>Avatar</h4>

    <div id="admin-avatar-grid" class="avatar-grid">

      <img src="avatars/1.png" data-avatar="avatars/1.png" class="avatar-option">

      <img src="avatars/10.png" data-avatar="avatars/10.png" class="avatar-option">

    </div>

  </div>

</div>
